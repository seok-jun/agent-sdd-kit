name: Validate Skill Evals

on:
  pull_request:
    paths:
      - "evals/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/validate-skill-evals.yml"
  push:
    branches: [main]
    paths:
      - "evals/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/validate-skill-evals.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate eval specifications
        run: python scripts/validate_eval_specs.py
      - name: Test eval harness
        run: python -m unittest discover -s tests -v
